<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f4ee;--surface:#fdfcf8;--card:#ffffff;--border:#d6dcc8;--gold:#5a7a4a;--gold-l:#7aab62;--gold-d:#3d5c32;--muted:#8a8070;--text:#2c2c24;--text-d:#5a5448;--success:#4a8c5c;--warn:#b07030;--danger:#b04040}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:#edeae2}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#header{background:linear-gradient(180deg,#eef0e8 0%,var(--surface) 100%);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:50}
#header-top{display:flex;align-items:center;justify-content:space-between;padding:12px 0 4px}
.logo{font-family:'Pinyon Script',cursive;font-size:28px;color:var(--gold);line-height:1}
.logo-sub{font-family:'Cormorant Garamond',serif;font-size:10px;color:var(--gold-d);letter-spacing:3px;text-transform:uppercase}
.save-status{font-size:10px;color:var(--gold-d);letter-spacing:1px}
nav{display:flex;overflow-x:auto;border-top:1px solid var(--border);margin-top:8px}
nav button{padding:10px 12px;font-size:10px;font-family:'Jost',sans-serif;font-weight:300;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;letter-spacing:1.5px;text-transform:uppercase;transition:color 0.2s}
nav button.active{color:var(--gold-d);border-bottom-color:var(--gold);font-weight:600}
#page{padding:14px 12px;max-width:960px;margin:0 auto}
.page-title{font-family:'Pinyon Script',cursive;font-size:30px;color:var(--gold);margin-bottom:2px}
.page-sub{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:14px;font-weight:300}
.sec-head{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--gold-d);letter-spacing:3px;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.divider{display:flex;align-items:center;gap:8px;margin:10px 0;opacity:0.45}
.divider-line{flex:1;height:1px}
.divider-line.left{background:linear-gradient(to right,transparent,var(--gold))}
.divider-line.right{background:linear-gradient(to left,transparent,var(--gold))}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:1px;text-transform:uppercase}
.prog-wrap{margin-bottom:14px}
.prog-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase}
.prog-track{background:var(--card);border-radius:3px;height:6px;border:1px solid var(--border);overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold-d),var(--gold));transition:width 0.6s ease}
.month-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer}
.month-lbl{width:36px;font-size:11px;color:var(--muted);letter-spacing:1px}
.month-track{flex:1;height:14px;background:var(--card);border-radius:3px;overflow:hidden;display:flex;border:1px solid var(--border)}
.month-count{font-size:10px;color:var(--muted);width:48px;text-align:right}
.cat-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;cursor:pointer;padding:3px 0}
.cat-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.cat-lbl{font-size:12px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:300}
.cat-mini-bar{width:80px;background:var(--card);border-radius:2px;height:4px;overflow:hidden;border:1px solid var(--border)}
.cat-count{font-size:10px;color:var(--muted);width:32px;text-align:right}
.task-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:5px;transition:opacity 0.2s;animation:fadeIn 0.3s ease}
.task-card.done{opacity:0.5}
.task-card.urgent{border-color:rgba(196,51,79,0.35)}
.task-name{font-size:13px;color:var(--text);line-height:1.4;flex:1;font-weight:300}
.task-name.done{text-decoration:line-through;color:var(--muted)}
.task-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;align-items:center}
.task-note{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--muted);font-style:italic;margin-top:5px;line-height:1.4}
.status-btn{font-size:9px;padding:2px 8px;border-radius:10px;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase;font-weight:500;border:1px solid transparent;font-family:'Jost',sans-serif}
.owner-tag{font-size:9px;padding:2px 6px;border-radius:4px;letter-spacing:0.5px}
.cat-tag{font-size:9px;padding:1px 6px;border-radius:4px;letter-spacing:0.5px}
.proj-tag{font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(201,168,76,0.1);color:var(--gold-d);letter-spacing:0.5px}
.date-tag{font-size:9px;color:rgba(138,127,168,0.6)}
.edit-btn{font-size:9px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;letter-spacing:0.5px;font-family:'Jost',sans-serif}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.filter-sel{font-size:10px;padding:5px 10px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;letter-spacing:0.5px;font-family:'Jost',sans-serif}
.search-box{width:100%;padding:9px 14px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);margin-bottom:10px;outline:none;font-family:'Jost',sans-serif}
.add-btn{font-size:11px;padding:8px 16px;border-radius:6px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;font-family:'Jost',sans-serif}
.result-count{font-size:10px;color:var(--muted);margin-bottom:10px;letter-spacing:1px}
.week-head{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--gold-d);letter-spacing:3px;text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
#chat-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
#chat-msgs{height:260px;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:85%;padding:8px 12px;border-radius:12px;font-size:12px;color:var(--text);line-height:1.5}
.chat-msg.user{align-self:flex-end;background:rgba(180,210,200,0.4);border:1px solid rgba(90,150,120,0.3);border-radius:12px 12px 2px 12px}
.chat-msg.assistant{align-self:flex-start;background:#f2f8f0;border:1px solid #c8d8c0;border-radius:12px 12px 12px 2px}
#chat-hints{display:flex;flex-wrap:wrap;gap:4px;padding:8px 14px;border-top:1px solid var(--border)}
.hint-btn{font-size:9px;padding:3px 8px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Jost',sans-serif;letter-spacing:0.5px}
#chat-input-row{display:flex;border-top:1px solid var(--border)}
#chat-in{flex:1;padding:11px 14px;font-size:12px;background:transparent;border:none;color:var(--text);outline:none;font-family:'Jost',sans-serif}
#chat-send{padding:0 18px;background:transparent;border:none;border-left:1px solid var(--border);color:var(--gold);font-size:11px;cursor:pointer;letter-spacing:1px;font-family:'Jost',sans-serif;text-transform:uppercase}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(5,3,10,0.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.modal-title{font-family:'Pinyon Script',cursive;font-size:26px;color:var(--gold);margin-bottom:4px}
.modal-sub{font-size:11px;color:var(--muted);margin-bottom:14px;letter-spacing:1px}
.field-label{font-size:10px;color:var(--gold-d);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:4px}
.field-input{width:100%;padding:8px 12px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);margin-bottom:12px;outline:none;font-family:'Jost',sans-serif}
.field-textarea{width:100%;padding:8px 12px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);margin-bottom:12px;min-height:72px;resize:vertical;outline:none;font-family:'Jost',sans-serif}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-save{padding:9px 22px;border-radius:6px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:12px;cursor:pointer;letter-spacing:1px;font-family:'Jost',sans-serif}
.btn-cancel{padding:9px 16px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Jost',sans-serif}
.btn-danger{padding:9px 16px;border-radius:6px;border:1px solid rgba(196,48,48,0.4);background:transparent;color:var(--danger);font-size:12px;cursor:pointer;font-family:'Jost',sans-serif}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px}
.empty{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--muted);font-style:italic;text-align:center;padding:40px 0}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%,100%{opacity:0.5}50%{opacity:1}}
.shimmer{animation:shimmer 1.5s ease-in-out infinite}
</style>
</head>

function load(){
  try{const s=localStorage.getItem(SK);tasks=s?JSON.parse(s):[...SEED];if(!s)save();}
  catch(e){tasks=[...SEED];}
}
let _st;
function save(){clearTimeout(_st);_st=setTimeout(()=>{try{localStorage.setItem(SK,JSON.stringify(tasks));ss("saved");}catch(e){ss("error");}},300);ss("saving...");}
function ss(t){const e=document.getElementById("save-status");if(e)e.textContent=t;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function pc(p){return PROJ_MAP[p]?PROJ_MAP[p].color:"#8a7fa8";}
function daysLeft(){return Math.ceil((new Date("2026-09-26")-new Date())/86400000);}

function swan(sz,op){sz=sz||14;op=op||0.5;return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 100 100" fill="none" style="opacity:'+op+';flex-shrink:0"><path d="M50 80 C30 75 10 60 8 40 C6 20 20 10 35 15 C42 17 48 22 50 28 C52 22 58 17 65 15 C80 10 94 20 92 40 C90 60 70 75 50 80Z" fill="#5a7a4a"/><path d="M50 80 C50 80 45 90 42 95 C39 98 44 100 50 98 C56 100 61 98 58 95 C55 90 50 80 50 80Z" fill="#5a7a4a"/><ellipse cx="35" cy="30" rx="4" ry="3" fill="#f0ede4"/></svg>';}
function divH(){return '<div class="divider"><div class="divider-line left"></div>'+swan(12,1)+'<div class="divider-line right"></div></div>';}

function spill(st,id){
  var c=STATUS[st]||STATUS["Not started"];
  return '<button class="status-btn" style="color:'+c.color+';background:'+c.bg+';border-color:'+c.dot+'44" onclick="cycleStatus(\''+id+'\')">'+esc(st)+'</button>';
}
function otag(o){
  var s=o==="Robbie"?"background:#ddeeff;color:#2a5a9a":o==="Suzanne"?"background:#fde8f0;color:#b0406a":o==="Robert Wing"?"background:#ddeeff;color:#2a5a9a":"background:#e4f0e0;color:#3a6a40";
  return '<span class="owner-tag" style="'+s+'">'+esc(o)+'</span>';
}
function ptag(p){
  var c=pc(p);
  return '<span class="cat-tag" style="background:'+c+'22;color:'+c+'">'+esc((p||"").split(" ").slice(0,2).join(" "))+'</span>';
}

function tcard(t){
  var isU=t.project==="URGENT — This Week";
  var sc=STATUS[t.status]||STATUS["Not started"];
  return '<div class="task-card'+(t.status==="Done"?" done":"")+(isU?" urgent":"")+'" style="border-left:3px solid '+sc.dot+'">'
    +'<div style="display:flex;gap:8px;align-items:flex-start"><div class="task-name'+(t.status==="Done"?" done":"")+'">'+esc(t.task)+'</div></div>'
    +'<div class="task-meta">'+spill(t.status,t.id)+otag(t.owner)+ptag(t.project)+(t.due?'<span class="date-tag">'+esc(t.due)+'</span>':'')
    +'<button class="edit-btn" onclick="openEdit(\''+t.id+'\')">edit</button></div>'
    +(t.notes?'<div class="task-note">'+esc(t.notes)+'</div>':"")
    +'</div>';
}
function sh(label){return '<div class="sec-head">'+swan(11,0.6)+' '+esc(label)+'</div>';}

function getStats(){
  var total=tasks.length,done=tasks.filter(t=>t.status==="Done").length,
      ip=tasks.filter(t=>t.status==="In progress").length,
      bl=tasks.filter(t=>t.status==="Blocked").length,
      urg=tasks.filter(t=>t.project==="URGENT — This Week"&&t.status!=="Done").length,
      pct=total?Math.round(done/total*100):0;
  return {total,done,ip,bl,urg,pct};
}

function renderDashboard(){
  var s=getStats();
  var cards=[
    {n:s.total,l:"total tasks",c:"#5a7a4a"},{n:s.done,l:"done",c:"#3db87a"},
    {n:s.ip,l:"in progress",c:"#c47c2a"},{n:s.bl,l:"blocked",c:"#c43030"},{n:s.urg,l:"urgent",c:"#c4334f"}
  ].map(function(x){return '<div class="stat-card" style="border-top:2px solid '+x.c+'"><div class="stat-n" style="color:'+x.c+'">'+x.n+'</div><div class="stat-l">'+x.l+'</div></div>';}).join("");

  var months=["Apr 2026","May 2026","Jun 2026","Jul 2026","Aug 2026","Sep 2026"];
  var mbars=months.map(function(m){
    var mt=tasks.filter(t=>t.month===m).length,md=tasks.filter(t=>t.month===m&&t.status==="Done").length,mi=tasks.filter(t=>t.month===m&&t.status==="In progress").length;
    var dp=mt?(md/mt)*100:0,ipp=mt?(mi/mt)*100:0;
    return '<div class="month-row" onclick="fMonth=\''+m+'\';setView(\'tasks\')">'
      +'<div class="month-lbl">'+m.split(" ")[0]+'</div>'
      +'<div class="month-track"><div style="width:'+dp+'%;background:#3db87a88;transition:width 0.5s"></div><div style="width:'+ipp+'%;background:#c47c2a88;transition:width 0.5s"></div></div>'
      +'<div class="month-count">'+md+"/"+mt+'</div></div>';
  }).join("");

  var domains=[...new Set(PROJECTS.map(p=>p.domain))];
  var catrows=domains.map(function(d){
    var dProjs=PROJECTS.filter(p=>p.domain===d);
    var dColor=dProjs[0].color;
    var dt=tasks.filter(t=>dProjs.some(p=>p.name===t.project)).length;
    var dd=tasks.filter(t=>dProjs.some(p=>p.name===t.project)&&t.status==="Done").length;
    if(!dt)return "";
    var pp=dt?(dd/dt)*100:0;
    return '<div class="cat-row" onclick="fProj=\'all\';fMonth=\'all\';fOwner=\'all\';fStatus=\'all\';fSearch=\'\';setView(\'tasks\')">'
      +'<div class="cat-dot" style="background:'+dColor+'"></div>'
      +'<div class="cat-lbl">'+esc(d)+'</div>'
      +'<div class="cat-mini-bar"><div class="cat-mini-fill" style="width:'+pp+'%;background:'+dColor+'"></div></div>'
      +'<div class="cat-count">'+dd+"/"+dt+'</div></div>';
  }).join("");

  var urgTasks=tasks.filter(t=>t.month==="Apr 2026"&&t.status!=="Done"&&new Date(t.due)<=new Date("2026-04-12")).slice(0,6);

  return '<div class="page-title">Overview</div>'
    +'<div class="page-sub">Wedding in '+daysLeft()+' days</div>'
    +'<div class="stat-grid">'+cards+'</div>'
    +'<div class="prog-wrap"><div class="prog-labels"><span>Overall progress</span><span>'+s.pct+'%</span></div>'
    +'<div class="prog-track"><div class="prog-fill" style="width:'+s.pct+'%"></div></div></div>'
    +divH()+sh("By Month")+mbars
    +divH()+sh("By Domain")+catrows
    +divH()+sh("Due This Week")
    +(urgTasks.length?urgTasks.map(tcard).join(""):'<div class="empty">All caught up ✦</div>');
}

function renderApril(){
  var aprTotal=tasks.filter(t=>t.month==="Apr 2026").length;
  var html='<div class="page-title">April 2026</div><div class="page-sub">'+aprTotal+' tasks this month</div>';
  var weeks=[["Week 1 — Act Now",1,9],["Week 2",10,19],["Week 3",20,26],["Week 4",27,31]];
  weeks.forEach(function(wk){
    var wt=tasks.filter(function(t){
      if(t.month!=="Apr 2026")return false;
      try{var d=new Date(t.due).getDate();return d>=wk[1]&&d<=wk[2];}catch(e){return false;}
    });
    if(!wt.length)return;
    var wd=wt.filter(t=>t.status==="Done").length;
    html+='<div class="week-head">'+swan(10,0.5)+' '+wk[0]+' <span style="color:var(--muted);font-weight:300;font-size:10px">'+wd+"/"+wt.length+'</span></div>';
    html+=wt.map(tcard).join("");
  });
  return html;
}

function renderGantt(){
  var START=new Date("2026-04-06");
  var WEEKS=[];
  for(var i=0;i<26;i++){var d=new Date(START);d.setDate(d.getDate()+i*7);WEEKS.push({label:d.toLocaleString("en-US",{month:"short"})+" "+d.getDate(),month:d.toLocaleString("en-US",{month:"short"})});}

  function wIdx(due){if(!due)return -1;var d=new Date(due);var diff=Math.floor((d-START)/(7*24*3600*1000));return Math.max(0,Math.min(25,diff));}

  var mSpans=[];var cm=null;
  WEEKS.forEach(function(w,i){if(!cm||cm.month!==w.month){if(cm)mSpans.push(cm);cm={month:w.month,start:i,count:1};}else cm.count++;});
  if(cm)mSpans.push(cm);

  var PH={
    prep:   {bg:"#e8f4e8",border:"#5a9a6a",text:"#3a6a48",lbl:"Prep"},
    build:  {bg:"#e4ecf8",border:"#4a72c0",text:"#2a4a8a",lbl:"Build"},
    details:{bg:"#fef6e4",border:"#c49040",text:"#8a6020",lbl:"Details"},
    goal:   {bg:"#eef4e8",border:"#5a7a4a",text:"#3d5c32",lbl:"Goal"},
  };

  function projPhases(pname){
    var pts=tasks.filter(t=>t.project===pname&&t.due);
    if(!pts.length)return[];
    var ws=pts.map(t=>wIdx(t.due)).filter(w=>w>=0).sort((a,b)=>a-b);
    if(!ws.length)return[];
    var mn=ws[0],mx=ws[ws.length-1],span=mx-mn;
    if(span===0)return[{s:mn,e:mn,t:"goal",l:pts[0].task.slice(0,18)}];
    var t3=Math.max(1,Math.floor(span/3));
    var phases=[];
    phases.push({s:mn,       e:Math.min(mn+t3-1,25),    t:"prep",    l:"Prep"});
    phases.push({s:mn+t3,    e:Math.min(mn+t3*2-1,25),  t:"build",   l:"Build"});
    if(mn+t3*2<=mx-1)phases.push({s:mn+t3*2,e:Math.min(mx-1,25),t:"details",l:"Details"});
    phases.push({s:Math.min(mx,25),e:Math.min(mx,25),t:"goal",l:"Goal"});
    return phases;
  }

  var wLoad=Array(26).fill(0);
  tasks.forEach(t=>{var w=wIdx(t.due);if(w>=0)wLoad[w]++;});

  var wHead=WEEKS.map(function(w,i){

  var domains=[...new Set(PROJECTS.map(p=>p.domain))];

    rows+='<tr><td colspan="'+(WEEKS.length+1)+'" style="background:#eef0e8;padding:4px 10px;font-size:9px;font-family:Cormorant Garamond,serif;letter-spacing:2px;text-transform:uppercase;color:'+dColor+';border-top:1px solid #d0d4c0;border-bottom:1px solid #ffffff">'
      +'<div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:2px;background:'+dColor+';flex-shrink:0"></div>'+domain+'</div></td></tr>';
    dProjs.forEach(function(proj){
      var phases=projPhases(proj.name);
      var pt=tasks.filter(t=>t.project===proj.name);
      var pd=pt.filter(t=>t.status==="Done").length;
      var pct=pt.length?Math.round(pd/pt.length*100):0;
      var isSel=ganttSel===proj.name;
      var wPhase=Array(26).fill(null);
      phases.forEach(function(ph){for(var w=ph.s;w<=Math.min(ph.e,25);w++){if(!wPhase[w]||ph.t==="goal")wPhase[w]=ph;}});
      var cells="";var i2=0;
      while(i2<WEEKS.length){
        var ph=wPhase[i2];
        if(!ph){cells+='<td style="width:'+CW+'px;min-width:'+CW+'px;height:'+RH+'px;border-right:1px solid #ffffff;border-bottom:1px solid #ffffff"></td>';i2++;}
        else{
          var span=1;while(i2+span<WEEKS.length&&wPhase[i2+span]===ph)span++;
          var ps=PH[ph.t]||PH.details;
          cells+='<td colspan="'+span+'" style="height:'+RH+'px;padding:2px 3px;border-right:1px solid #ffffff;border-bottom:1px solid #ffffff">'
            +'<div style="width:100%;height:18px;background:'+ps.bg+';border:1px solid '+ps.border+';border-radius:'+(ph.t==="goal"?3:6)+'px;display:flex;align-items:center;padding:0 4px;overflow:hidden">'
            +'<span style="font-size:8px;color:'+ps.text+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(ph.lbl)+'</span></div></td>';
          i2+=span;
        }
      }
      rows+='<tr style="background:'+(isSel?"rgba(90,122,74,0.08)":"transparent")+';cursor:pointer" onclick="selectGP(\''+esc(proj.name)+'\')">'
        +'<td style="position:sticky;left:0;z-index:10;background:'+(isSel?"#eef4e8":"#ffffff")+';padding:0 8px;height:'+RH+'px;border-right:2px solid '+(isSel?"#5a7a4a":"#d0d4c0")+';border-bottom:1px solid #ffffff;white-space:nowrap;min-width:'+LW+'px;width:'+LW+'px">'
        +'<div style="display:flex;align-items:center;gap:5px"><div style="width:4px;height:4px;border-radius:50%;background:'+proj.color+';flex-shrink:0"></div>'
        +'<span style="font-size:10px;color:'+(isSel?"#5a7a4a":"#e8dfc8")+';overflow:hidden;text-overflow:ellipsis;flex:1">'+esc(proj.name)+'</span>'
        +(pt.length?'<span style="font-size:8px;color:'+(pct===100?"#3db87a":"#b0aa9a")+';flex-shrink:0">'+pct+'%</span>':"")
        +'</div></td>'+cells+'</tr>';
    });
  });

  var panel="";
  if(ganttSel){
    var sp=PROJ_MAP[ganttSel];var sc2=sp?sp.color:"#5a7a4a";
    var selTasks=tasks.filter(t=>t.project===ganttSel).sort((a,b)=>(a.due||"").localeCompare(b.due||""));
    panel='<div style="margin-top:16px;background:#ffffff;border:1px solid #d0d4c0;border-left:3px solid '+sc2+';border-radius:8px;padding:14px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
      +'<div style="font-family:Pinyon Script,cursive;font-size:22px;color:'+sc2+'">'+esc(ganttSel)+'</div>'
      +'<button onclick="ganttSel=null;render()" style="background:transparent;border:none;color:#b0aa9a;cursor:pointer;font-size:18px">×</button></div>'
      +(selTasks.length?selTasks.map(function(t){
        var sc3=STATUS[t.status]||STATUS["Not started"];
        return '<div style="display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-bottom:1px solid #f7f4ee">'
          +'<div style="flex:1;font-size:11px;color:'+(t.status==="Done"?"#b0aa9a":"#e8dfc8")+';text-decoration:'+(t.status==="Done"?"line-through":"none")+';font-weight:300">'+esc(t.task)+'</div>'
          +'<button style="font-size:8px;padding:2px 7px;border-radius:8px;background:'+sc3.bg+';color:'+sc3.color+';border:1px solid '+sc3.dot+'44;cursor:pointer;white-space:nowrap;font-family:Jost,sans-serif" onclick="cycleStatus(\''+t.id+'\')">'+t.status+'</button>'
          +'<span style="font-size:8px;color:#8a8070;white-space:nowrap">'+esc(t.due||"")+'</span></div>';
      }).join(""):'<div style="font-size:11px;color:#b0aa9a;font-style:italic;font-family:Cormorant Garamond,serif">No tasks assigned yet. Use the assistant to add some.</div>')
      +'<button onclick="jumpToProject()" style="margin-top:10px;font-size:10px;padding:6px 14px;border-radius:6px;border:1px solid #d0d4c0;background:transparent;color:#8a7fa8;cursor:pointer;font-family:Jost,sans-serif">View all tasks →</button>'
      +'</div>';
  }

  var legend=Object.entries(PH).map(function(kv2){return '<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:'+kv2[1].text+'"><div style="width:18px;height:8px;background:'+kv2[1].bg+';border:1px solid '+kv2[1].border+';border-radius:'+(kv2[0]==="goal"?2:4)+'px"></div>'+kv2[1].lbl+'</div>';}).join("");

  var conflict=wLoad.findIndex(function(l,i){return i>0&&l>8;});
  var cNote=conflict>=0?'<div style="font-size:10px;color:#c47c2a;margin-top:4px">Week of '+WEEKS[conflict].label+' has '+wLoad[conflict]+' tasks — check for conflicts</div>':"";

  return '<div class="page-title">Gantt Chart</div>'
    +'<div class="page-sub">49 projects · Live from task data · Click a project row to see its tasks · Scroll right for Sep</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;align-items:center">'+legend+'</div>'+cNote
    +'<div style="overflow-x:auto;border:1px solid #d0d4c0;border-radius:8px;margin-top:10px">'
    +'<div style="min-width:'+(LW+26*CW)+'px">'
    +'<table style="border-collapse:collapse;width:100%">'
    +'<thead><tr>'
    +'<th style="position:sticky;left:0;z-index:20;background:#f0ede4;width:'+LW+'px;min-width:'+LW+'px;border-right:2px solid #d0d4c0;border-bottom:1px solid #d0d4c0;padding:5px 8px;text-align:left;font-size:9px;color:#7a6228;letter-spacing:2px;text-transform:uppercase">Project</th>'
    +mHead+'</tr><tr>'
    +'<th style="position:sticky;left:0;z-index:20;background:#f0ede4;width:'+LW+'px;min-width:'+LW+'px;border-right:2px solid #d0d4c0;border-bottom:2px solid #d0d4c0"></th>'
    +wHead+'</tr></thead><tbody>'+rows+'</tbody></table></div></div>'
    +panel
    +'<div style="margin-top:10px;font-size:10px;color:#8a8070;font-family:Cormorant Garamond,serif;font-style:italic">Phases calculated from actual task due dates · Darker week = more tasks due</div>';
}

function updateGanttPreview(){
  var proj=document.getElementById("edit-proj").value;
  var newDue=document.getElementById("edit-due").value;
  var preview=document.getElementById("gantt-preview");
  var inner=document.getElementById("gantt-preview-inner");
  if(!proj||!preview||!inner){return;}
  preview.style.display="block";

  // Get all tasks in this project (excluding the one being edited)
  var pt=tasks.filter(function(t){return t.project===proj&&t.id!==editId&&t.due;});
  var allDues=pt.map(function(t){return t.due;});

  // Current range (without edited task)
  var projDones=pt.filter(function(t){return t.status==="Done";}).length;
  var projTotal=pt.length;

  // Add the new due date to see impact
  if(newDue) allDues.push(newDue);
  allDues.sort();

  var earliest=allDues[0]||"";
  var latest=allDues[allDues.length-1]||"";

  // Format as readable month
  function fmtDate(d){
    if(!d)return"TBD";
    var dt=new Date(d);
    return dt.toLocaleString("en-US",{month:"short",day:"numeric"});
  }
  function monthOf(d){
    if(!d)return"";
    return new Date(d).toLocaleString("en-US",{month:"long"});
  }

  var span=allDues.length>1?(allDues.length+" tasks, "+fmtDate(earliest)+" → "+fmtDate(latest)):"Single task: "+fmtDate(latest);
  var prepEnd=allDues[Math.floor(allDues.length/3)]||earliest;
  var buildEnd=allDues[Math.floor(allDues.length*2/3)]||latest;

  var html2="<strong style='color:var(--text)'>"+esc(proj)+"</strong><br>";
  html2+="<span style='color:#3a6a48'>● Prep</span> through "+fmtDate(prepEnd)+"&nbsp;&nbsp;";
  html2+="<span style='color:#2a4a8a'>● Build</span> through "+fmtDate(buildEnd)+"&nbsp;&nbsp;";
  html2+="<span style='color:#3d5c32'>● Goal</span> "+fmtDate(latest)+"<br>";
  html2+="<span style='color:var(--muted);font-size:10px'>"+span+"&nbsp;·&nbsp;"+projDones+"/"+projTotal+" done in project</span>";
  if(newDue&&latest===newDue){
    html2+="<br><span style='color:#8a5c1a;font-size:10px'>⚠ This task sets the Goal date for the whole project</span>";
  }
  if(newDue&&earliest===newDue){
    html2+="<br><span style='color:#3a6a48;font-size:10px'>✦ This task starts the Prep phase for the whole project</span>";
  }
  inner.innerHTML=html2;
}

async function sendChat(){
  var el=document.getElementById("chat-in");
  if(!el)return;
  var msg=el.value.trim();
  if(!msg||chatLoading)return;
  el.value="";
  chatMsgs.push({role:"user",text:msg});

  try{
    var res=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:[{role:"user",content:msg}]})});
    var data=await res.json();
    var reply=(data.content&&data.content[0]&&data.content[0].text||"").trim();
    var parsed=null;
    try{parsed=JSON.parse(reply);}catch(e){}
    if(parsed){
      var actions=Array.isArray(parsed)?parsed:[parsed];
      var rt="";
      actions.forEach(function(a){
        if(a.action==="add"){
          var nt={id:"t"+Date.now()+Math.floor(Math.random()*9999),task:a.task,project:a.project||"General",owner:a.owner||"Both",due:a.due||"",month:a.month||"Apr 2026",status:a.status||"Not started",notes:a.notes||""};
          tasks.push(nt);rt+="Added: "+a.task+"\n";
        }else if(a.action==="update"){
          var t=tasks.find(t=>t.id===a.id);
          if(t){
            if(a.status)t.status=a.status;
            if(a.notes)t.notes=t.notes?t.notes+" · "+a.notes:a.notes;
            if(a.project&&PROJ_NAMES.includes(a.project))t.project=a.project;
            if(a.owner)t.owner=a.owner;
            if(a.due)t.due=a.due;
            rt+="Updated: "+t.task+" → "+(a.status||a.project||"updated")+"\n";
          }
        }
      });
      save();chatMsgs.push({role:"assistant",text:rt.trim()||"Done."});
    }else{chatMsgs.push({role:"assistant",text:reply});}
  }catch(e){chatMsgs.push({role:"assistant",text:"Something went wrong — try again."});}
  chatLoading=false;render();
}

// Modals need project field
document.addEventListener("keydown",function(e){if(e.key==="Escape"){document.getElementById("edit-modal").style.display="none";document.getElementById("add-modal").style.display="none";}});

load();
document.getElementById("loading").style.display="none";
document.getElementById("app").style.display="block";
render();

</script>
