<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Kite + Wing — Wedding Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Pinyon+Script&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f4ee;--surface:#fdfcf8;--card:#fff;
  --border:#d6dcc8;--sage:#5a7a4a;--sage-l:#7aab62;--sage-d:#3d5c32;
  --muted:#8a8070;--text:#2c2c24;--text-d:#5a5448;
  --success:#4a8c5c;--warn:#b07030;--danger:#b04040;
  --rose:#fde8f0;--rose-d:#b0406a;--blue:#ddeeff;--blue-d:#2a5a9a;
  --green:#e4f0e0;--green-d:#3a6a40;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Jost',sans-serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#header{background:linear-gradient(180deg,#eef0e8 0%,var(--surface) 100%);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;padding:0 14px}
#header-top{display:flex;align-items:center;justify-content:space-between;padding:10px 0 4px}
.logo{font-family:'Pinyon Script',cursive;font-size:26px;color:var(--sage-d);line-height:1}
.logo-sub{font-family:'Cormorant Garamond',serif;font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase}
.days-pill{font-size:11px;font-weight:500;color:var(--danger);background:#faeaea;padding:3px 10px;border-radius:12px;letter-spacing:0.5px}
nav{display:flex;overflow-x:auto;border-top:1px solid var(--border);margin-top:6px}
nav button{padding:9px 13px;font-size:11px;font-family:'Jost',sans-serif;font-weight:300;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;letter-spacing:1.5px;text-transform:uppercase;transition:color 0.2s}
nav button.active{color:var(--sage-d);border-bottom-color:var(--sage);font-weight:500}
#page{padding:14px;max-width:860px;margin:0 auto;padding-bottom:60px}
.pg-title{font-family:'Pinyon Script',cursive;font-size:30px;color:var(--sage-d);margin-bottom:2px}
.pg-sub{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:14px;font-weight:300}
.sec-head{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--sage-d);letter-spacing:3px;text-transform:uppercase;margin:18px 0 8px;display:flex;align-items:center;gap:8px}
.divider{display:flex;align-items:center;gap:8px;margin:12px 0;opacity:0.4}
.divider-line{flex:1;height:1px}.divider-line.l{background:linear-gradient(to right,transparent,var(--sage))}.divider-line.r{background:linear-gradient(to left,transparent,var(--sage))}
/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600}
.stat-l{font-size:10px;color:var(--muted);margin-top:1px;letter-spacing:1px;text-transform:uppercase}
.prog-wrap{margin-bottom:14px}
.prog-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase}
.prog-track{background:#e8e4dc;border-radius:3px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--sage-d),var(--sage));transition:width 0.6s}
/* TASK CARDS */
.task-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.task-card.urgent{border-left:3px solid var(--danger)}
.task-card.done{opacity:0.5}
.task-top{display:flex;gap:8px;align-items:flex-start}
.task-name{font-size:13px;color:var(--text);line-height:1.4;flex:1;font-weight:300}
.task-name.done{text-decoration:line-through;color:var(--muted)}
.task-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;align-items:center}
.status-btn{font-size:9px;padding:2px 8px;border-radius:10px;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase;font-weight:500;border:1px solid transparent;font-family:'Jost',sans-serif}
.owner-tag{font-size:9px;padding:2px 6px;border-radius:4px;letter-spacing:0.5px}
.proj-tag{font-size:9px;padding:1px 6px;border-radius:4px;letter-spacing:0.5px;background:#f0ede4;color:var(--muted)}
.due-tag{font-size:9px;color:#bbb}
.edit-btn{font-size:9px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Jost',sans-serif}
.task-note{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--muted);font-style:italic;margin-top:5px;line-height:1.4}
/* SUBSTEPS */
.substeps{margin-top:8px;border-top:1px solid #f0ede4;padding-top:8px}
.substep{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;cursor:pointer}
.substep-cb{width:14px;height:14px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.substep-cb.checked{background:var(--sage);border-color:var(--sage)}
.substep-cb.checked::after{content:"✓";font-size:9px;color:white;font-weight:700}
.substep-text{font-size:11px;color:var(--text-d);line-height:1.4;flex:1}
.substep-text.checked{text-decoration:line-through;color:#bbb}
.substep-progress{font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:0.5px}
/* FILTERS */
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.filter-sel{font-size:10px;padding:5px 10px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-family:'Jost',sans-serif}
.search-box{width:100%;padding:9px 14px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);margin-bottom:10px;outline:none;font-family:'Jost',sans-serif}
.add-btn{font-size:11px;padding:8px 16px;border-radius:6px;border:1px solid var(--sage);background:transparent;color:var(--sage-d);cursor:pointer;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;font-family:'Jost',sans-serif}
.result-count{font-size:10px;color:var(--muted);margin-bottom:10px;letter-spacing:1px}
/* WEEK SECTION */
.week-head{font-family:'Cormorant Garamond',serif;font-size:12px;color:var(--sage-d);letter-spacing:3px;text-transform:uppercase;margin:18px 0 8px;display:flex;align-items:center;gap:6px}
/* CHAT */
#chat-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
#chat-msgs{height:220px;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:85%;padding:8px 12px;border-radius:12px;font-size:12px;color:var(--text);line-height:1.5}
.chat-msg.user{align-self:flex-end;background:rgba(90,122,74,0.15);border:1px solid rgba(90,122,74,0.25);border-radius:12px 12px 2px 12px}
.chat-msg.assistant{align-self:flex-start;background:#f2f8f0;border:1px solid #c8d8c0;border-radius:12px 12px 12px 2px}
#chat-hints{display:flex;flex-wrap:wrap;gap:4px;padding:8px 14px;border-top:1px solid var(--border)}
.hint-btn{font-size:9px;padding:3px 8px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Jost',sans-serif;letter-spacing:0.5px}
#chat-input-row{display:flex;border-top:1px solid var(--border)}
#chat-in{flex:1;padding:10px 14px;font-size:12px;background:transparent;border:none;color:var(--text);outline:none;font-family:'Jost',sans-serif}
#chat-send{padding:0 16px;background:transparent;border:none;border-left:1px solid var(--border);color:var(--sage-d);font-size:11px;cursor:pointer;letter-spacing:1px;font-family:'Jost',sans-serif;text-transform:uppercase}
/* MODAL */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(40,50,30,0.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.modal-title{font-family:'Pinyon Script',cursive;font-size:24px;color:var(--sage-d);margin-bottom:12px}
.field-label{font-size:10px;color:var(--sage-d);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:4px}
.field-input{width:100%;padding:8px 12px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);margin-bottom:12px;outline:none;font-family:'Jost',sans-serif}
.field-textarea{width:100%;padding:8px 12px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);margin-bottom:12px;min-height:72px;resize:vertical;outline:none;font-family:'Jost',sans-serif}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-save{padding:8px 20px;border-radius:6px;border:1px solid var(--sage);background:transparent;color:var(--sage-d);font-size:12px;cursor:pointer;font-family:'Jost',sans-serif}
.btn-cancel{padding:8px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Jost',sans-serif}
.btn-danger{padding:8px 14px;border-radius:6px;border:1px solid rgba(176,64,64,0.4);background:transparent;color:var(--danger);font-size:12px;cursor:pointer;font-family:'Jost',sans-serif}
/* URGENT CARD */
.urgent-card{background:#fff8f8;border:1px solid rgba(176,64,64,0.2);border-left:3px solid var(--danger);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.shimmer{animation:shimmer 1.5s ease-in-out infinite}
@keyframes shimmer{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease}
</style>
</head>
<body>
<!-- MODALS -->
<div id="edit-modal" class="overlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <div class="modal-title">Edit Task</div>
    <label class="field-label">Task</label><input class="field-input" id="edit-task">
    <label class="field-label">Status</label><select class="field-input" id="edit-status"></select>
    <label class="field-label">Owner</label><select class="field-input" id="edit-owner"></select>
    <label class="field-label">Project</label><select class="field-input" id="edit-proj"></select>
    <label class="field-label">Due date</label><input class="field-input" id="edit-due" type="date">
    <label class="field-label">Notes</label><textarea class="field-textarea" id="edit-notes"></textarea>
    <div class="btn-row">
      <button class="btn-danger" onclick="deleteTask()">Delete</button>
      <button class="btn-cancel" onclick="document.getElementById('edit-modal').style.display='none'">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>
<div id="add-modal" class="overlay" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <div class="modal-title">Add Task</div>
    <label class="field-label">Task name</label><input class="field-input" id="add-task" placeholder="What needs to happen?">
    <label class="field-label">Project</label><select class="field-input" id="add-proj"></select>
    <label class="field-label">Owner</label><select class="field-input" id="add-owner"></select>
    <label class="field-label">Due date</label><input class="field-input" id="add-due" type="date">
    <label class="field-label">Notes</label><textarea class="field-textarea" id="add-notes" placeholder="Context, substeps, materials..."></textarea>
    <div class="btn-row">
      <button class="btn-cancel" onclick="document.getElementById('add-modal').style.display='none'">Cancel</button>
      <button class="btn-save" onclick="saveAdd()">Add</button>
    </div>
  </div>
</div>

<div id="header">
  <div id="header-top">
    <div><div class="logo">Kite + Wing</div><div class="logo-sub">Sept 26, 2026 · Catskill, NY</div></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="days-pill" id="days-pill">67 days</div>
      <button onclick="resetApp()" style="font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Jost',sans-serif;letter-spacing:0.5px">Reset</button>
      <span style="font-size:10px;color:var(--muted)" id="save-status">saved</span>
    </div>
  </div>
  <nav id="nav"></nav>
</div>
<div id="page"></div>

// ── STORAGE ───────────────────────────────────────────────────────
function load(){
  try{
    const s=localStorage.getItem(SK);
    if(s){tasks=JSON.parse(s);}
    else{tasks=SEED.map(t=>({...t,substeps:(t.substeps||[]).map(s=>({...s}))}));save();}
  }catch{tasks=SEED.map(t=>({...t,substeps:(t.substeps||[]).map(s=>({...s}))}))}
}
let saveTimer;
function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{localStorage.setItem(SK,JSON.stringify(tasks));setSS("saved")}catch{setSS("error")}
  },300);
  setSS("saving…");
}
function setSS(s){const e=document.getElementById("save-status");if(e)e.textContent=s}

// ── HELPERS ───────────────────────────────────────────────────────
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function ownerStyle(o){
  if(o==="Robbie")return'background:#ddeeff;color:#2a5a9a';
  if(o==="Suzanne")return'background:#fde8f0;color:#b0406a';
  return'background:#e4f0e0;color:#3a6a40';
}
function statusStyle(st){
  const s=STATUS[st]||STATUS["Not started"];
  return`color:${s.color};background:${s.bg};border-color:${s.dot}44`;
}
function cycleStatus(id){
  const order=["Not started","In progress","Done","Blocked"];
  const t=tasks.find(t=>t.id===id);if(!t)return;
  t.status=order[(order.indexOf(t.status)+1)%order.length];
  save();render();
}
function toggleSubstep(taskId,idx){
  const t=tasks.find(t=>t.id===taskId);if(!t||!t.substeps)return;
  t.substeps[idx].done=!t.substeps[idx].done;
  // Auto-advance status
  const total=t.substeps.length,done=t.substeps.filter(s=>s.done).length;
  if(done===total&&t.status!=="Done")t.status="Done";
  else if(done>0&&t.status==="Not started")t.status="In progress";
  save();render();
}

// ── TASK CARD HTML ────────────────────────────────────────────────
function taskCard(t,showSubsteps=false){
  const isUrgent=t.month==="Jul 2026"&&t.status!=="Done";
  const sc=STATUS[t.status]||STATUS["Not started"];
  const substeps=t.substeps||[];
  const doneSubs=substeps.filter(s=>s.done).length;
  const totalSubs=substeps.length;
  const subPct=totalSubs?(doneSubs/totalSubs*100).toFixed(0):null;

  let subsHtml="";
  if(showSubsteps&&totalSubs>0){
    const items=substeps.map((s,i)=>`
      <div class="substep" onclick="toggleSubstep('${esc(t.id)}',${i})">
        <div class="substep-cb${s.done?" checked":""}"></div>
        <div class="substep-text${s.done?" checked":""}">${esc(s.text)}</div>
      </div>`).join("");
    subsHtml=`<div class="substeps">${items}
      <div class="substep-progress">${doneSubs}/${totalSubs} steps done</div>
    </div>`;
  } else if(!showSubsteps&&totalSubs>0){
    subsHtml=`<div style="margin-top:5px;cursor:pointer;font-size:10px;color:var(--muted)" onclick="expandTask('${esc(t.id)}')">${doneSubs}/${totalSubs} steps — tap to expand</div>`;
  }

  return`<div class="task-card${isUrgent&&t.status!=="Done"?" urgent":""} ${t.status==="Done"?"done":""} fade-in" id="tc-${esc(t.id)}">
    <div class="task-top">
      <div class="task-name${t.status==="Done"?" done":""}">${esc(t.task)}</div>
    </div>
    <div class="task-meta">
      <button class="status-btn" style="${statusStyle(t.status)}" onclick="cycleStatus('${esc(t.id)}')">${t.status}</button>
      <span class="owner-tag" style="${ownerStyle(t.owner)}">${esc(t.owner)}</span>
      <span class="proj-tag">${esc((t.project||"").split(" ").slice(0,3).join(" "))}</span>
      ${t.due?`<span class="due-tag">${esc(t.due)}</span>`:""}
      <button class="edit-btn" onclick="openEdit('${esc(t.id)}')">edit</button>
    </div>
    ${t.notes?`<div class="task-note">${esc(t.notes)}</div>`:""}
    ${subsHtml}
  </div>`;
}

let expandedTasks=new Set();
function expandTask(id){
  if(expandedTasks.has(id))expandedTasks.delete(id);
  else expandedTasks.add(id);
  render();
}

// ── STATS ─────────────────────────────────────────────────────────
function stats(){
  const total=tasks.length,done=tasks.filter(t=>t.status==="Done").length;
  const ip=tasks.filter(t=>t.status==="In progress").length;
  const bl=tasks.filter(t=>t.status==="Blocked").length;
  const thisWeek=tasks.filter(t=>t.month==="Jul 2026"&&t.status!=="Done"&&t.due<="2026-07-27").length;
  return{total,done,ip,bl,thisWeek,pct:total?Math.round(done/total*100):0};
}

function divider(){return`<div class="divider"><div class="divider-line l"></div><svg width="12" height="12" viewBox="0 0 100 100" fill="none" style="opacity:0.6"><path d="M50 80 C30 75 10 60 8 40 C6 20 20 10 35 15 C42 17 48 22 50 28 C52 22 58 17 65 15 C80 10 94 20 92 40 C90 60 70 75 50 80Z M50 80 C50 80 45 90 42 95 C39 98 44 100 50 98 C56 100 61 98 58 95 C55 90 50 80 50 80Z" fill="#5a7a4a"/></svg><div class="divider-line r"></div></div>`}

function renderDash(){
  const s=stats();
  // This week = Jul 21-27, urgent = due by Jul 27 not done
  const urgent=tasks.filter(t=>t.status!=="Done"&&t.due>=""&&t.due<="2026-07-27").sort((a,b)=>a.due.localeCompare(b.due));
  const inprog=tasks.filter(t=>t.status==="In progress");

  let html=`<div class="pg-title">This Week</div>
  <div class="pg-sub">July 21–27 · ${DAYS_LEFT} days to wedding · ${urgent.length} tasks need attention</div>
  <div class="stat-grid">
    ${[{n:DAYS_LEFT,l:"days left",c:"var(--danger)"},{n:s.total,l:"total tasks",c:"var(--sage)"},{n:s.done,l:"done",c:"var(--success)"},{n:s.ip,l:"in progress",c:"var(--warn)"},{n:urgent.length,l:"this week",c:"var(--danger)"}].map(({n,l,c})=>`<div class="stat-card" style="border-top:2px solid ${c}"><div class="stat-n" style="color:${c}">${n}</div><div class="stat-l">${l}</div></div>`).join("")}
  </div>
  <div class="prog-wrap"><div class="prog-labels"><span>Overall progress</span><span>${s.pct}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${s.pct}%"></div></div></div>
  ${divider()}
  <div class="sec-head">🔴 Must do this week</div>`;

  if(!urgent.length){html+=`<div style="font-size:12px;color:var(--success);font-family:'Cormorant Garamond',serif;font-style:italic;padding:8px 0">All this week's tasks complete ✦</div>`;}
  else{html+=urgent.map(t=>taskCard(t,expandedTasks.has(t.id))).join("");}

  if(inprog.length){
    html+=`${divider()}<div class="sec-head">⏳ In progress</div>`;
    html+=inprog.map(t=>taskCard(t,expandedTasks.has(t.id))).join("");
  }
  return html;
}

function renderMonth(month,label){
  const mt=tasks.filter(t=>t.month===month).sort((a,b)=>a.due.localeCompare(b.due));
  const done=mt.filter(t=>t.status==="Done").length;
  let html=`<div class="pg-title">${label}</div><div class="pg-sub">${mt.length} tasks · ${done} done · ${mt.length-done} remaining</div>`;

  // Group by project
  const projs=[...new Set(mt.map(t=>t.project))];
  projs.forEach(proj=>{
    const pt=mt.filter(t=>t.project===proj);
    const pd=pt.filter(t=>t.status==="Done").length;
    html+=`<div class="sec-head"><span>${esc(proj)}</span><span style="color:var(--muted);font-weight:300;font-size:10px;margin-left:4px">${pd}/${pt.length}</span></div>`;
    html+=pt.map(t=>taskCard(t,expandedTasks.has(t.id))).join("");
  });
  return html;
}

    ${hasF?`<button class="filter-sel" style="color:var(--danger);border-color:rgba(176,64,64,0.3)" onclick="fProj=fOwner=fMonth=fStatus='all';fSearch='';render()">clear</button>`:""}
  </div>
  <button class="add-btn" onclick="openAdd()">+ Add task</button>
  <div class="result-count">${filtered.length} tasks</div>
  ${filtered.map(t=>taskCard(t,expandedTasks.has(t.id))).join("")||'<div style="font-size:13px;color:var(--muted);text-align:center;padding:40px 0;font-family:\'Cormorant Garamond\',serif;font-style:italic">No tasks match.</div>'}`;
}

// ── RENDER ENGINE ─────────────────────────────────────────────────
function setView(v){view=v;render();window.scrollTo(0,0)}
function render(){
  const nav=document.getElementById("nav");
  nav.innerHTML=VIEWS.map(([v,l])=>`<button class="${view===v?"active":""}" onclick="setView('${v}')">${l}</button>`).join("");
  const page=document.getElementById("page");
  switch(view){
    case"dash":    page.innerHTML=renderDash();break;
    case"july":    page.innerHTML=renderMonth("Jul 2026","July 2026");break;
    case"august":  page.innerHTML=renderMonth("Aug 2026","August 2026");break;
    case"sept":    page.innerHTML=renderMonth("Sep 2026","September 2026");break;
    case"beadwork":page.innerHTML=renderBeadwork();break;
    case"builds":  page.innerHTML=renderBuilds();break;
    case"chat":    page.innerHTML=renderChat();setTimeout(()=>{const e=document.getElementById("chat-msgs");if(e)e.scrollTop=e.scrollHeight},50);break;
    case"tasks":   page.innerHTML=renderTasks();break;
    case"robbie":  page.innerHTML=renderRobbie();break;
  }
  const dp=document.getElementById("days-pill");
  if(dp)dp.textContent=DAYS_LEFT+" days";
}

// ── EDIT / ADD ────────────────────────────────────────────────────
function populateSels(){
  ["edit-status"].forEach(id=>{const e=document.getElementById(id);if(e)e.innerHTML=Object.keys(STATUS).map(s=>`<option value="${s}">${s}</option>`).join("")});
  ["edit-owner","add-owner"].forEach(id=>{const e=document.getElementById(id);if(e)e.innerHTML=OWNERS.map(o=>`<option value="${o}">${o}</option>`).join("")});
  ["edit-proj","add-proj"].forEach(id=>{const e=document.getElementById(id);if(e)e.innerHTML=PROJ_NAMES.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join("")});
}
function openEdit(id){
  editId=id;const t=tasks.find(t=>t.id===id);if(!t)return;
  populateSels();
  document.getElementById("edit-task").value=t.task;
  document.getElementById("edit-status").value=t.status;
  document.getElementById("edit-owner").value=t.owner;
  document.getElementById("edit-proj").value=t.project||"";
  document.getElementById("edit-due").value=t.due||"";
  document.getElementById("edit-notes").value=t.notes||"";
  document.getElementById("edit-modal").style.display="flex";
}
function saveEdit(){
  const t=tasks.find(t=>t.id===editId);if(!t)return;
  t.task=document.getElementById("edit-task").value;
  t.status=document.getElementById("edit-status").value;
  t.owner=document.getElementById("edit-owner").value;
  t.project=document.getElementById("edit-proj").value;
  t.due=document.getElementById("edit-due").value;
  t.month=t.due?"??? 2026":"Sep 2026";
  if(t.due>="2026-07-01"&&t.due<="2026-07-31")t.month="Jul 2026";
  else if(t.due>="2026-08-01"&&t.due<="2026-08-31")t.month="Aug 2026";
  else if(t.due>="2026-09-01")t.month="Sep 2026";
  t.notes=document.getElementById("edit-notes").value;
  document.getElementById("edit-modal").style.display="none";
  save();render();
}
function deleteTask(){
  if(!confirm("Delete this task?"))return;
  tasks=tasks.filter(t=>t.id!==editId);
  document.getElementById("edit-modal").style.display="none";
  save();render();
}
function openAdd(){
  populateSels();
  document.getElementById("add-modal").style.display="flex";
}
function saveAdd(){
  const task=document.getElementById("add-task").value.trim();if(!task)return;
  const due=document.getElementById("add-due").value;
  let month="Aug 2026";
  if(due>="2026-07-01"&&due<="2026-07-31")month="Jul 2026";
  else if(due>="2026-09-01")month="Sep 2026";
  tasks.push({id:"u"+Date.now(),project:document.getElementById("add-proj").value,task,owner:document.getElementById("add-owner").value,due,month,status:"Not started",notes:document.getElementById("add-notes").value,substeps:[]});
  document.getElementById("add-modal").style.display="none";
  document.getElementById("add-task").value="";
  save();render();
}

// ── CHAT ──────────────────────────────────────────────────────────
function setHint(h){const e=document.getElementById("chat-in");if(e)e.value=h}
async function sendChat(){
  const el=document.getElementById("chat-in");if(!el)return;
  const msg=el.value.trim();if(!msg||chatLoading)return;
  el.value="";chatMsgs.push({role:"user",text:msg});chatLoading=true;render();
  const summary=tasks.slice(0,60).map(t=>`${t.id}|${t.task}|${t.status}|${t.owner}|${t.month}|${t.project}`).join("\n");
  try{
    const res=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      model:"claude-sonnet-4-20250514",max_tokens:1000,
      system:`You are a wedding assistant for Suzanne Kite and Robert Wing, wedding September 26 2026, 67 days away. Today is July 21 2026.
Key context: Nothing on the critical list is done — no beadwork started, no admin closed, no interior rooms painted, no ceremony scripts written. Urgency is high.
Valid projects: ${PROJ_NAMES.join(", ")}
Valid owners: Suzanne, Robbie, Both
Current tasks (first 60): ${summary}
For ADD: JSON {"action":"add","task":"name","project":"project","owner":"owner","due":"2026-MM-DD","notes":"notes"}
For UPDATE: JSON {"action":"update","id":"id","status":"Done","notes":"note"}
For MULTIPLE: JSON array [...actions]
For questions: plain text, warm and direct. No markdown. Be honest about urgency.`,
      messages:[{role:"user",content:msg}]
    })});
    const data=await res.json();
    const reply=(data.content?.[0]?.text||"").trim();
    let parsed=null;try{parsed=JSON.parse(reply)}catch{}
    if(parsed){
      const actions=Array.isArray(parsed)?parsed:[parsed];
      let txt="";
      actions.forEach(a=>{
        if(a.action==="add"){
          const due=a.due||"";
          let month="Aug 2026";
          if(due>="2026-07-01"&&due<="2026-07-31")month="Jul 2026";
          else if(due>="2026-09-01")month="Sep 2026";
          tasks.push({id:"u"+Date.now()+Math.random(),project:a.project||"Final Week + Teardown",task:a.task,owner:a.owner||"Both",due,month,status:"Not started",notes:a.notes||"",substeps:[]});
          txt+=`Added: "${a.task}"\n`;
        }else if(a.action==="update"){
          const t=tasks.find(t=>t.id===a.id);
          if(t){if(a.status)t.status=a.status;if(a.notes)t.notes=t.notes?t.notes+" · "+a.notes:a.notes;txt+=`Updated "${t.task}" → ${a.status||"updated"}\n`;}
        }
      });
      save();chatMsgs.push({role:"assistant",text:txt.trim()||"Done."});
    }else{chatMsgs.push({role:"assistant",text:reply});}
  }catch{chatMsgs.push({role:"assistant",text:"Something went wrong — try again."});}
  chatLoading=false;render();
}

// ── RESET ────────────────────────────────────────────────────────
function resetApp(){
  if(!confirm("Reset to the clean July task list? This clears all old data.")) return;
  localStorage.removeItem(SK);
  // Also clear any old keys
  ["kw-v1","kw-v2","kw-v3","kw-v4","kw-v5","kw-v6","kw-v7","kw-v8","kw-v9","kw-v10","kw-v11","kw-v12"].forEach(k=>localStorage.removeItem(k));
  tasks = SEED.map(t=>({...t, substeps:(t.substeps||[]).map(s=>({...s}))}));
  save();
  render();
  alert("Done — loaded " + tasks.length + " tasks.");
}

// ── INIT ──────────────────────────────────────────────────────────
load();render();
document.addEventListener("keydown",e=>{if(e.key==="Escape"){document.getElementById("edit-modal").style.display="none";document.getElementById("add-modal").style.display="none";}});
</script>
